name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Prepare release assets
        run: |
          VERSION_TAG="${GITHUB_REF_NAME}"
          ARCHIVE_PREFIX="jtl-comparator-${VERSION_TAG}"
          git archive --format=tar.gz --prefix="${ARCHIVE_PREFIX}/" -o "${ARCHIVE_PREFIX}.tar.gz" HEAD
          git archive --format=zip --prefix="${ARCHIVE_PREFIX}/" -o "${ARCHIVE_PREFIX}.zip" HEAD
          sha256sum "${ARCHIVE_PREFIX}.tar.gz" "${ARCHIVE_PREFIX}.zip" > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            jtl-comparator-*.tar.gz
            jtl-comparator-*.zip
            SHA256SUMS.txt
